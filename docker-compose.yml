services:
  backend:
    image: 21e51a6241akash/supachat-backend:latest
    container_name: supachat_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - supachat_net

  frontend:
    image: 21e51a6241akash/supachat-frontend:latest
    container_name: supachat_frontend
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - supachat_net

  nginx:
    image: nginx:alpine
    container_name: supachat_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - supachat_net

networks:
  supachat_net:
    driver: bridge