services:
  backend:
    image: 21e51a6241akash/supachat-backend:latest
    container_name: supachat_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - supachat_net

  frontend:
    image: 21e51a6241akash/supachat-frontend:latest
    container_name: supachat_frontend
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - supachat_net

  nginx:
    image: nginx:alpine
    container_name: supachat_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - supachat_net

  prometheus:
    image: prom/prometheus:latest
    container_name: supachat_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
      - cadvisor
      - node-exporter
    networks:
      - supachat_net

  grafana:
    image: grafana/grafana:latest
    container_name: supachat_grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - supachat_net

  loki:
    image: grafana/loki:latest
    container_name: supachat_loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - supachat_net

  promtail:
    image: grafana/promtail:latest
    container_name: supachat_promtail
    restart: always
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - supachat_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: supachat_cadvisor
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    networks:
      - supachat_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: supachat_node_exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - supachat_net

networks:
  supachat_net:
    driver: bridge

volumes:
  grafana_data:
  loki_data: