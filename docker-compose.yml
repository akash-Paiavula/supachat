version: "3.9"

services:

  backend:
    build: ./backend
    container_name: supachat_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://ec2-35-170-248-25.compute-1.amazonaws.com:8000
    container_name: supachat_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend